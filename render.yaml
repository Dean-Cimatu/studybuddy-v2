services:
  - type: cron
    name: studybuddy-keep-alive
    runtime: node
    plan: free
    region: oregon
    schedule: "*/10 * * * *"
    buildCommand: echo "keep-alive"
    startCommand: node -e "fetch('https://studybuddy-v2.onrender.com/api/health').then(r=>console.log('ping',r.status)).catch(console.error)"

  - type: web
    name: studybuddy-v2
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
