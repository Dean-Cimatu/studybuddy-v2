services:
  - type: web
    name: studybuddy-v2
    runtime: docker
    repo: https://github.com/Dean-Cimatu/studybuddy-v2
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
