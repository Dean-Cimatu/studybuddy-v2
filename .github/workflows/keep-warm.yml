name: Keep Warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --max-time 10 "${{ secrets.DEPLOYED_URL }}/api/health" \
            && echo "✅ Service is warm" \
            || echo "⚠️  Health check returned non-200 (service may be starting)"
